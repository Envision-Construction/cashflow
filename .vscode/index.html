<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envision Financial Suite 2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .statement-row td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #f1f5f9; }
        .statement-total td { background-color: #f8fafc; font-weight: 700; border-top: 2px solid #e2e8f0; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCTL6KFc45icS6fuZiQ9XpBpHU8SJbKtOo",
            authDomain: "cash-flow-app-46893.firebaseapp.com",
            projectId: "cash-flow-app-46893",
            storageBucket: "cash-flow-app-46893.firebasestorage.app",
            messagingSenderId: "941640320942",
            appId: "1:941640320942:web:740e0f2560bbf0d8dfaa3f"
        };
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvPFMTM_5M2ahhS29Jf8lKZD5Xk6VJ_fv7ihzdKpYnoYfeVJG-qzPEmY6lmoygClfP/exec";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- STATE ---
        let rawData = [];
        let projectList = {}; 
        let weeks = [];
        let currentView = 'Dashboard';
        let includePipeline = false;
        let minCashTarget = Number(localStorage.getItem('minCashTarget')) || 250000;
        let openingCashBalance = Number(localStorage.getItem('openingCash')) || 850000;
        let chartInstance = null;
        let searchQuery = "";
        let activeOpBudgetFilter = null;

        // --- INIT ---
        async function init() {
            try {
                // 1. Fetch Cash Flow Data
                const snapshot = await getDocs(collection(db, "CashFlow"));
                let fetchedData = [];
                snapshot.forEach(doc => fetchedData.push(doc.data()));
                
                // --- DATA NORMALIZATION ---
                // Ensure DataType matches what the Dashboard expects (Fixes WIP/Pipeline visibility)
                const typeMap = { 
                    'WIP Forecast': 'WIP', 
                    'Pipeline Forecast': 'Pipeline', 
                    'Project Expenses': 'ProjectCF', 
                    'Quickpay Cash Flow': 'QuickPay', 
                    'Operating Budget': 'OpBudget', 
                    'Financing Cash Flow': 'Financing', 
                    'Lines of Credit': 'CreditLines' 
                };
                fetchedData.forEach(d => {
                    if (typeMap[d.DataType]) d.DataType = typeMap[d.DataType];
                });

                // Process Financing Liabilities
                let processedData = processFinancingData(fetchedData);
                
                // Process Operating Budget Templates
                rawData = processOpBudgetData(processedData);
                
                // Filter weeks to exclude old history (keep recent past + future)
                const today = new Date();
                // Start from the 1st of last month
                const startOfLastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                const cutoff = startOfLastMonth.toISOString().split('T')[0];

                weeks = [...new Set(rawData.map(d => d.Week_Ending))]
                    .filter(w => w && w >= cutoff)
                    .sort();

                // 2. Fetch Procore Project List (BigQuery/Mock Sync)
                try {
                    const configDoc = await getDoc(doc(db, "Configuration", "ProcoreProjects"));
                    if (configDoc.exists()) {
                        projectList = JSON.parse(configDoc.data().projectList);
                    }
                } catch (e) {
                    console.warn("ProcoreProjects config not found, skipping.");
                }

                renderSidebar();
                renderLayout();
                populateProjectDropdown();
            } catch (e) {
                console.error(e);
                alert("Data Load Error. Check console.");
            }
        }

        // --- HELPERS ---
        const getFiltered = (type) => rawData.filter(d => d.DataType === type);
        const fmt = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
        const fmtCompact = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', notation: "compact", maximumFractionDigits: 1 }).format(num);
        const sum = (week, filters, dataset = rawData) => dataset.filter(d => d.Week_Ending === week && Object.entries(filters).every(([k, v]) => d[k] === v)).reduce((acc, c) => acc + (Number(c.Amount)||0), 0);

        function processFinancingData(data) {
            const expanded = [];
            data.forEach(item => {
                // Check if item is a Financing Liability definition
                // Supports new headers: Liability_ID, Creditor, Type, Category, Status, First_Payment, End_Date, Occurrences, Frequency, Amount
                const isFinancing = item.DataType === 'Financing' || (item.Liability_ID && item.Creditor);
                
                if (isFinancing && (item.Frequency || item.Occurrences || item.Liability_ID)) {
                    expanded.push(...generateLiabilitySchedule(item));
                } else {
                    expanded.push(item);
                }
            });
            return expanded;
        }

        function processOpBudgetData(data) {
            const expanded = [];
            const today = new Date();
            const sixMonthsLater = new Date(today);
            sixMonthsLater.setMonth(today.getMonth() + 6);

            data.forEach(item => {
                // Normalize DataType
                if (item.DataType === 'Operating Budget') item.DataType = 'OpBudget';

                // Check for OpBudget Items
                if (item.DataType === 'OpBudget') {
                    // Force Sign Logic for ALL OpBudget items (Template or Manual)
                    let amt = parseFloat(item.Amount);
                    const isInflow = ['Revenue', 'Inflow'].includes(item.Entry_Type);
                    if (!isInflow && amt > 0) amt = -amt; // Force negative for expenses
                    if (isInflow && amt < 0) amt = Math.abs(amt); // Force positive for revenue
                    item.Amount = amt;

                    // Expand Templates if needed
                    if (!item.Week_Ending && item.Frequency && item.Amount) {
                        expanded.push(...generateOpBudgetSchedule(item, today, sixMonthsLater));
                    } else {
                        expanded.push(item);
                    }
                } else {
                    expanded.push(item);
                }
            });
            return expanded;
        }

        function generateOpBudgetSchedule(item, startDate, endDate) {
            const entries = [];
            let amt = item.Amount; 

            if (item.Frequency === 'One-Time') {
                if (item.Due_Date) {
                    const dueDate = new Date(item.Due_Date);
                    const weekEnding = getNextFriday(dueDate);
                    entries.push({
                        ...item,
                        Week_Ending: weekEnding.toISOString().split('T')[0],
                        Amount: amt,
                        DataType: 'OpBudget'
                    });
                }
                return entries;
            }

            // Weekly / Bi-Weekly Logic
            if (item.Frequency === 'Weekly' || item.Frequency === 'Bi-Weekly') {
                let cursor = item.Due_Date ? new Date(item.Due_Date) : new Date(startDate);
                const interval = item.Frequency === 'Weekly' ? 7 : 14;
                
                // Safety: If cursor is way behind startDate, advance it
                if (cursor < startDate) {
                    const diffTime = Math.abs(startDate - cursor);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    const cycles = Math.floor(diffDays / interval);
                    cursor.setDate(cursor.getDate() + (cycles * interval));
                }

                while (cursor <= endDate) {
                    if (cursor >= startDate) {
                        const weekEnding = getNextFriday(cursor);
                        entries.push({
                            ...item,
                            Week_Ending: weekEnding.toISOString().split('T')[0],
                            Amount: amt,
                            DataType: 'OpBudget'
                        });
                    }
                    cursor.setDate(cursor.getDate() + interval);
                }
                return entries;
            }

            // Monthly Logic (Default)
            let currentMonth = new Date(startDate);
            currentMonth.setDate(1); 

            while (currentMonth <= endDate) {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                
                let targetDate = null;
                const fridays = getAllFridays(year, month);
                
                const cycle = item.Pay_Cycle || '1st Week';

                if (cycle === '1st Week') targetDate = fridays[0];
                else if (cycle === '2nd Week') targetDate = fridays[1];
                else if (cycle === '3rd Week') targetDate = fridays[2];
                else if (cycle === '4th Week') targetDate = fridays[3] || fridays[fridays.length - 1]; 
                
                if (targetDate && targetDate >= startDate) {
                    entries.push({
                        ...item,
                        Week_Ending: targetDate.toISOString().split('T')[0],
                        Amount: amt,
                        DataType: 'OpBudget'
                    });
                }

                currentMonth.setMonth(currentMonth.getMonth() + 1);
            }
            return entries;
        }

        function getAllFridays(year, month) {
            const d = new Date(year, month, 1);
            const fridays = [];
            while (d.getDay() !== 5) {
                d.setDate(d.getDate() + 1);
            }
            while (d.getMonth() === month) {
                fridays.push(new Date(d));
                d.setDate(d.getDate() + 7);
            }
            return fridays;
        }

        function generateLiabilitySchedule(item) {
            const entries = [];
            let currentDate = new Date(item.First_Payment);
            if (isNaN(currentDate.getTime())) return []; 

            const occurrences = parseInt(item.Occurrences) || 999;
            const frequency = (item.Frequency || '').toLowerCase();
            const amount = parseFloat(item.Amount) || 0;
            const endDate = item.End_Date ? new Date(item.End_Date) : null;

            let count = 0;
            while (count < occurrences) {
                if (endDate && currentDate > endDate) break;
                if (count > 520) break; // Safety limit (10 years)

                const weekEnding = getNextFriday(currentDate);
                
                entries.push({
                    ...item,
                    Week_Ending: weekEnding.toISOString().split('T')[0],
                    Amount: amount,
                    Detail: item.Type || item.Description, // Map Type to Detail
                    DataType: 'Financing',
                    Project: item.Creditor || item.Project || 'General' // Map Creditor to Project (grouping)
                });

                if (frequency === 'weekly') currentDate.setDate(currentDate.getDate() + 7);
                else if (frequency === 'bi-weekly') currentDate.setDate(currentDate.getDate() + 14);
                else if (frequency === 'monthly') currentDate.setMonth(currentDate.getMonth() + 1);
                else break; 
                
                count++;
            }
            return entries;
        }

        function getNextFriday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = 5 - day; 
            if (diff < 0) d.setDate(d.getDate() + (diff + 7));
            else d.setDate(d.getDate() + diff);
            return d;
        }

        // --- UI ---
        function renderSidebar() {
            const items = [
                { name: 'Dashboard', icon: 'layout-dashboard', desc: 'Statement of Cash Flows' },
                { name: 'WIP Forecast', icon: 'hard-hat', desc: 'Active Projects' },
                { name: 'Pipeline Forecast', icon: 'filter', desc: 'Pursuit Opportunities' },
                { name: 'Project Expenses', icon: 'briefcase', desc: 'Direct Costs' },
                { name: 'Quickpay Cash Flow', icon: 'zap', desc: 'Viva / Supply Chain' },
                { name: 'Operating Budget', icon: 'building', desc: 'OpEx / G&A' },
                { name: 'Financing Cash Flow', icon: 'landmark', desc: 'Debt Service' },
                { name: 'Lines of Credit', icon: 'credit-card', desc: 'Brex / Rho Lines' }
            ];
            
            document.getElementById('sidebar-nav').innerHTML = items.map(i => `
                <button onclick="window.setView('${i.name}')" 
                    class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-all rounded-lg mb-1
                    ${currentView === i.name ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}">
                    <i data-lucide="${i.icon}" class="w-5 h-5"></i>
                    <div>
                        <div class="leading-none">${i.name}</div>
                        <div class="text-[10px] opacity-60 font-normal mt-1 leading-none">${i.desc}</div>
                    </div>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderLayout() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-100 sticky top-0 z-30">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">${currentView}</h2>
                        <p class="text-xs text-slate-500 flex items-center gap-1">
                            ${Object.keys(projectList).length > 0 ? '<span class="text-green-500">●</span> Procore Analytics Connected' : '<span class="text-yellow-500">●</span> Local Mode'}
                        </p>
                    </div>
                    <div class="flex items-center gap-3">
                         <div class="flex flex-col text-right mr-2 bg-slate-50 px-3 py-1 rounded-lg border border-slate-200">
                             <span class="text-[10px] uppercase font-bold text-slate-400">Opening Balance</span>
                             <span class="font-mono font-bold text-slate-700 cursor-pointer hover:text-blue-600" onclick="window.editOpening()">${fmt(openingCashBalance)}</span>
                         </div>
                         <div class="flex flex-col text-right mr-2 bg-slate-50 px-3 py-1 rounded-lg border border-slate-200">
                             <span class="text-[10px] uppercase font-bold text-slate-400">Min. Cash Target</span>
                             <span class="font-mono font-bold text-slate-700 cursor-pointer hover:text-blue-600" onclick="window.editTarget()">${fmt(minCashTarget)}</span>
                         </div>
                        <button onclick="window.openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition flex items-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Entry
                        </button>
                    </div>
                </header>
                <div id="view-container"></div>
            `;
            
            const container = document.getElementById('view-container');
            if (currentView === 'Dashboard') {
                container.innerHTML = renderDashboard();
                renderChart();
            } else {
                container.innerHTML = renderModuleView(currentView);
            }
            lucide.createIcons();
        }

        function renderDashboard() {
            // Show more weeks to cover history + forecast (e.g., 20 weeks)
            const weeksList = weeks.slice(0, 20);
            let currentBal = openingCashBalance;
            const projectedBalances = [];
            const weeklyNet = [];

            weeksList.forEach(w => {
                let opIn = sum(w, {}, getFiltered('WIP'));
                if(includePipeline) opIn += sum(w, {}, getFiltered('Pipeline'));
                const opOut = sum(w, {}, getFiltered('ProjectCF')) + sum(w, {Category:'Outflow'}, getFiltered('QuickPay')) + sum(w, {}, getFiltered('OpBudget'));
                const fin = sum(w, {Category:'Inflow'}, getFiltered('QuickPay')) + sum(w, {}, getFiltered('Financing'));
                const net = opIn + opOut + fin;
                weeklyNet.push(net);
                currentBal += net;
                projectedBalances.push(currentBal);
            });

            // Calculate 13-Week Low based on FUTURE cash flows only
            const todayStr = new Date().toISOString().split('T')[0];
            const futureBalances = projectedBalances.filter((_, i) => weeksList[i] >= todayStr);
            // Take the next 13 weeks from today
            const next13WeeksBalances = futureBalances.slice(0, 13);
            
            // Fallback to all projected if no future weeks found (edge case)
            const minBal = next13WeeksBalances.length > 0 ? Math.min(...next13WeeksBalances) : Math.min(...projectedBalances);
            const isCritical = minBal < minCashTarget;

            return `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-center">
                        <p class="text-xs font-bold text-slate-400 uppercase">13-Week Low</p>
                        <h3 class="text-2xl font-bold ${isCritical ? 'text-red-600' : 'text-slate-800'}">${fmt(minBal)}</h3>
                        <p class="text-xs ${isCritical ? 'text-red-500' : 'text-green-500'} mt-1 flex items-center gap-1">
                            <i data-lucide="${isCritical ? 'alert-triangle' : 'check-circle'}" class="w-3 h-3"></i>
                            ${isCritical ? 'Below Target' : 'Target Secure'}
                        </p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 col-span-3">
                        <div class="h-72 relative"><canvas id="cashFlowChart"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="p-3 text-left min-w-[220px] sticky-col font-bold text-slate-700 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">Cash Flow Category</th>
                                    ${weeksList.map(w => `<th class="p-2 text-right min-w-[110px] text-slate-500 font-medium text-xs border-l border-slate-100 bg-slate-50/50">${w}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="statement-header"><td class="p-2 pl-4 sticky-col bg-slate-50/30">Operating Inflows</td><td colspan="${weeksList.length}"></td></tr>
                                ${renderRow('(+) Project Cash Receipts', 'WIP', null, weeksList)}
                                ${includePipeline ? renderRow('(+) Pipeline', 'Pipeline', null, weeksList, 'text-blue-600') : ''}
                                <tr class="statement-header"><td class="p-2 pl-4 sticky-col bg-slate-50/30">Project Expenses</td><td colspan="${weeksList.length}"></td></tr>
                                ${renderRow('(-) Direct Costs', 'ProjectCF', null, weeksList, 'text-red-500')}
                                ${renderRow('(-) QuickPay Repayment', 'QuickPay', {Category:'Outflow'}, weeksList, 'text-red-500')}
                                <tr class="statement-header"><td class="p-2 pl-4 sticky-col bg-slate-50/30">Operating & Overhead</td><td colspan="${weeksList.length}"></td></tr>
                                ${renderRow('(-) OpEx / G&A', 'OpBudget', null, weeksList, 'text-red-500')}
                                <tr class="statement-header"><td class="p-2 pl-4 sticky-col bg-slate-50/30">Adjustments</td><td colspan="${weeksList.length}"></td></tr>
                                ${renderRow('(+) Viva Funding', 'QuickPay', {Category:'Inflow'}, weeksList, 'text-green-600')}
                                ${renderRow('(+/-) Debt Activity', 'Financing', null, weeksList, 'text-slate-600')}
                                <tr class="statement-total">
                                    <td class="p-3 sticky-col bg-slate-50 border-r border-slate-200">Ending Cash Balance</td>
                                    ${projectedBalances.map(b => `<td class="text-right p-3 border-l border-slate-200 ${b<minCashTarget ? 'text-red-600 bg-red-50':''}">${fmt(b)}</td>`).join('')}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderRow(title, type, filters, weeks, colorClass = "text-slate-600") {
            let html = `<tr class="statement-row hover:bg-slate-50 transition-colors">
                <td class="p-3 pl-6 sticky-col text-slate-700 font-medium border-r border-slate-50 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">${title}</td>`;
            weeks.forEach(w => {
                const val = sum(w, filters || {}, getFiltered(type));
                html += `<td class="p-3 text-right border-l border-slate-50 ${colorClass} ${val===0 ? 'opacity-30':''}">${fmt(val)}</td>`;
            });
            return html + '</tr>';
        }

        // --- MODULE VIEW: WITH PROCORE DETAILS ---
        function renderModuleView(type) {
            const map = { 'WIP Forecast': 'WIP', 'Pipeline Forecast': 'Pipeline', 'Project Expenses': 'ProjectCF', 'Quickpay Cash Flow': 'QuickPay', 'Operating Budget': 'OpBudget', 'Financing Cash Flow': 'Financing', 'Lines of Credit': 'CreditLines' };
            let data = getFiltered(map[type]);

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                data = data.filter(d => (d.Project && d.Project.toLowerCase().includes(q)) || (d.Detail && d.Detail.toLowerCase().includes(q)) || (d.Expense_Group && d.Expense_Group.toLowerCase().includes(q)) || (d.Expense_Item && d.Expense_Item.toLowerCase().includes(q)) || (d.Vendor_Payee && d.Vendor_Payee.toLowerCase().includes(q)));
            }

            // --- SPECIAL HANDLING FOR OPERATING BUDGET ---
            if (type === 'Operating Budget') {
                // Filter by active filter if set
                if (activeOpBudgetFilter) {
                    data = data.filter(d => d.Control_Type === activeOpBudgetFilter);
                }

                // Group by Control_Type -> Expense_Group -> Expense_Item
                const grouped = {};
                const controlTypeTotals = {};
                let grandTotal = 0;

                // Calculate totals from FULL dataset (before filtering for display) to keep summary cards correct
                // Actually, usually summary cards should reflect the full picture, or the filtered picture?
                // User said "act as a dynamic filter on the module items".
                // Usually summary cards act as filters, so they should show totals for that category.
                // Let's re-calculate totals based on the FULL dataset for the cards, but use filtered data for the list.
                
                const fullOpData = getFiltered('OpBudget');
                fullOpData.forEach(d => {
                    const ct = d.Control_Type || 'Uncategorized';
                    const amt = Number(d.Amount) || 0;
                    controlTypeTotals[ct] = (controlTypeTotals[ct] || 0) + amt;
                    grandTotal += amt;
                });

                data.forEach(d => {
                    const ct = d.Control_Type || 'Uncategorized';
                    const eg = d.Expense_Group || 'General';
                    const ei = d.Expense_Item || 'Misc';
                    
                    if (!grouped[ct]) grouped[ct] = {};
                    if (!grouped[ct][eg]) grouped[ct][eg] = {};
                    if (!grouped[ct][eg][ei]) grouped[ct][eg][ei] = [];
                    
                    grouped[ct][eg][ei].push(d);
                });

                return `
                    <!-- Summary Cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-slate-800 text-white p-4 rounded-xl shadow-lg cursor-pointer hover:bg-slate-700 transition" onclick="window.filterOpBudget(null)">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Grand Total</p>
                            <h3 class="text-lg font-bold">${fmt(grandTotal)}</h3>
                            ${activeOpBudgetFilter ? '<p class="text-[10px] text-slate-400 mt-1">Click to Clear Filter</p>' : ''}
                        </div>
                        ${Object.entries(controlTypeTotals).map(([ct, amt]) => `
                            <div class="bg-white p-4 rounded-xl border ${activeOpBudgetFilter === ct ? 'border-blue-500 ring-2 ring-blue-100' : 'border-slate-200'} shadow-sm cursor-pointer hover:shadow-md transition" onclick="window.filterOpBudget('${ct}')">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${ct}</p>
                                <h3 class="text-lg font-bold ${amt < 0 ? 'text-red-600' : 'text-green-600'}">${fmt(amt)}</h3>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Search -->
                    <div class="mb-4 flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200 max-w-md">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 ml-2"></i>
                        <input type="text" placeholder="Search expenses..." onkeyup="window.handleSearch(this.value)" class="w-full text-sm outline-none p-1">
                    </div>

                    <!-- Grouped Table -->
                    <div class="space-y-4">

        window.toggleAccordion = (id) => { document.getElementById(id).classList.toggle('expanded'); document.getElementById('icon-'+id).classList.toggle('rotate-180'); };
        window.editTarget = () => { const n = prompt("Set Min Cash Target:", minCashTarget); if(n) { minCashTarget=Number(n); localStorage.setItem('minCashTarget', n); renderLayout(); }};
        window.editOpening = () => { const n = prompt("Set Opening Cash Balance:", openingCashBalance); if(n) { openingCashBalance=Number(n); localStorage.setItem('openingCash', n); renderLayout(); }};
        window.openModal = () => {
            const modal = document.getElementById('entry-modal');
            const standardFields = document.getElementById('standard-fields');
            const opBudgetFields = document.getElementById('opbudget-fields');
            const modalTitle = document.getElementById('modal-title');

            modal.classList.remove('hidden');
            
            if (currentView === 'Operating Budget') {
                standardFields.classList.add('hidden');
                opBudgetFields.classList.remove('hidden');
                modalTitle.innerText = "Add Operating Budget Entry";
            } else {
                standardFields.classList.remove('hidden');
                opBudgetFields.classList.add('hidden');
                modalTitle.innerText = "Add Forecast Entry";
            }
        };
        window.closeModal = () => document.getElementById('entry-modal').classList.add('hidden');
        
        window.saveEntry = async () => { 
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = "Saving...";
            btn.disabled = true;
            
            const map = { 'WIP Forecast': 'WIP', 'Pipeline Forecast': 'Pipeline', 'Project Expenses': 'ProjectCF', 'Quickpay Cash Flow': 'QuickPay', 'Operating Budget': 'OpBudget', 'Financing Cash Flow': 'Financing', 'Lines of Credit': 'CreditLines' };
            const targetTab = map[currentView];
            
            let payload = {};

            if (currentView === 'Operating Budget') {
                payload = {
                    Entry_ID: "OP_" + Date.now(),
                    DataType: 'OpBudget',
                    Week_Ending: document.getElementById('op_date').value, // Can be blank
                    Entry_Type: document.getElementById('op_type').value,
                    Expense_Group: document.getElementById('op_group').value,
                    Expense_Item: document.getElementById('op_item').value,
                    Control_Type: document.getElementById('op_control').value,
                    Allocation: document.getElementById('op_alloc').value,
                    'Vendor/Payee': document.getElementById('op_vendor').value,
                    Invoice_or_Ref: document.getElementById('op_ref').value,
                    Pay_Cycle: document.getElementById('op_cycle').value,
                    Frequency: document.getElementById('op_freq').value,
                    Detail: document.getElementById('op_detail').value,
                    Amount: document.getElementById('op_amount').value,
                    Due_Date: document.getElementById('op_due').value
                };
                
                // Validation for OpBudget
                if (!payload.Amount) {
                    alert("Amount is required");
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }
            } else {
                // Standard Logic
                payload = {
                    Entry_ID: "FCST_" + Date.now(),
                    Week_Ending: document.getElementById('in_date').value,
                    DataType: targetTab || 'Manual',
                    Project: document.getElementById('in_proj').value || 'General',
                    Category: document.getElementById('in_cat').value,
                    Detail: document.getElementById('in_det').value,
                    Amount: document.getElementById('in_amt').value
                };

                if (!payload.Week_Ending || !payload.Amount) {
                    alert("Please fill in Date and Amount");
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }
            }

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // For local update, we need to re-process if it's a template
                // But for simplicity, we just push and re-render. 
                // If it's a template, processOpBudgetData needs to run again.
                // We can just push to rawData and re-run init-like logic or just reload.
                // Better: Push to rawData, then if OpBudget, re-run processOpBudgetData on the single item and add results?
                // Simplest: Push to rawData. If OpBudget, we might need to reload to see expansion or just alert user.
                // Let's try to be smart:
                
                if (currentView === 'Operating Budget') {
                    // If it's a template, we need to expand it locally to see it immediately
                    if (!payload.Week_Ending && payload.Pay_Cycle && payload.Frequency) {
                        const today = new Date();
                        const sixMonthsLater = new Date(today);
                        sixMonthsLater.setMonth(today.getMonth() + 6);
                        const expanded = generateOpBudgetSchedule(payload, today, sixMonthsLater);
                        rawData.push(...expanded);
                        // Also push the template itself so it persists in memory? 
                        // Actually rawData usually holds the source. 
                        // But here rawData is holding the expanded version for display.
                        // So pushing expanded entries is correct for display.
                    } else {
                        rawData.push({ ...payload, Amount: Number(payload.Amount) });
                    }
                } else {
                    rawData.push({ ...payload, Amount: Number(payload.Amount) });
                }

                if (payload.Week_Ending && !weeks.includes(payload.Week_Ending)) {
                    weeks.push(payload.Week_Ending);
                    weeks.sort();
                }
                
                renderLayout();
                window.closeModal();
                
                // Clear inputs
                if(currentView !== 'Operating Budget') {
                    document.getElementById('in_amt').value = '';
                    document.getElementById('in_det').value = '';
                }

            } catch (e) {
                console.error(e);
                alert("Error saving: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        window.onload = init;
    </script>
</head>
